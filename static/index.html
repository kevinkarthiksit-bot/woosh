<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Woosh | Doorstep Car & Bike Wash</title>
    <meta
      name="description"
      content="Woosh offers premium doorstep car and bike wash services with fast booking and reliable cleaning."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="navbar" id="navbar">
      <div class="nav-inner">
        <a href="#top" class="brand">Woosh</a>
        <a href="#booking" class="btn btn-sm">Book Now</a>
      </div>
    </header>

    <main>
      <section class="hero" id="top">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <h1>Woosh</h1>
          <p>Doorstep Car &amp; Bike Wash</p>
          <a href="#booking" class="btn">Book Now</a>
        </div>
      </section>

      <section class="section section-soft" id="booking">
        <div class="container">
          <div class="section-header">
            <h2>Book Your Slot</h2>
          </div>
          <div id="statusBanner" class="status-banner" hidden></div>
          <form id="bookingForm" class="card form-card" novalidate>
            <div class="step" data-step="1">
              <label for="vehicle">Package</label>
              <select id="vehicle" name="vehicle" required>
                <option value="" disabled selected>Select package</option>
                <option value="Car">Car</option>
                <option value="Bike">Bike</option>
                <option value="Deep Cleaning">Deep Cleaning</option>
              </select>

              <label for="bookingDate">Date</label>
              <input id="bookingDate" name="bookingDate" type="date" required />

              <label for="timeSlot">Time Slot</label>
              <select id="timeSlot" name="timeSlot" required>
                <option value="" disabled selected>Select time slot</option>
              </select>
            </div>

            <div class="step" data-step="2" hidden>
              <h3>Booking Summary</h3>
              <div id="summaryPanel" class="summary-panel"></div>
            </div>

            <div class="step" data-step="3" hidden>
              <h3>Your Details</h3>
              <label for="name">Name</label>
              <input id="name" name="name" type="text" placeholder="Your name" required />

              <label for="phone">Phone</label>
              <input id="phone" name="phone" type="tel" placeholder="Your phone number" required />
            </div>

            <div class="flow-actions">
              <button type="button" id="backBtn" class="btn btn-secondary" hidden>Back</button>
              <button type="button" id="nextBtn" class="btn">Next</button>
              <button type="submit" id="submitBtn" class="btn" hidden>Confirm Booking</button>
            </div>
          </form>

          <section id="successScreen" class="card success-screen" hidden>
            <h3>Booking Successful 🎉</h3>
            <p>Your booking has been placed. Our team will contact you shortly.</p>
            <a href="#top" class="btn">Return Home</a>
          </section>
        </div>
      </section>
    </main>

    <script src="/static/script.js"></script>
  </body>
</html>
